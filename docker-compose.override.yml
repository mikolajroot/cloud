services:
  nginx:
    ports:
      - "80:8080"
    volumes:
      - type: bind
        source: ./frontend_src
        target: /usr/share/nginx/html

  postgres:
    ports:
      - "5432:5432"

  adminer:
    ports:
      - "8080:8080"

  pgadmin:
    ports:
      - "5050:80"

  backend_1:
    build: ./backend
    volumes:
      - type: bind
        source: ./backend/src
        target: /api/src

  backend_2:
    build: ./backend
    volumes:
      - type: bind
        source: ./backend/src
        target: /api/src

  worker:
    build: ./worker
    volumes:
      - type: bind
        source: ./worker/src
        target: /app/src