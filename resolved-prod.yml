name: cloud
services:
  backend_1:
    configs:
      - source: app_config
        target: /api/src/config.js
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      APP_VERSION: v2
      BACKEND_PORT_1: "3000"
      BACKEND_PORT_2: "3001"
      LOG_LEVEL: debug
      PORT: "3000"
      REDIS_URL: redis://redis:6379
    image: mikolajroot/backend:latest
    logging:
      driver: json-file
    networks:
      app-net: null
      db-net: null
      proxy-net:
        ipv4_address: 172.18.0.11
    secrets:
      - source: db_password
        target: /run/secrets/db_password
      - source: db_user
        target: /run/secrets/db_user
    tmpfs:
      - /app/tmp_data
    volumes:
      - type: volume
        source: backend_data
        target: /app/persistent_data
        volume: {}
  backend_2:
    configs:
      - source: app_config
        target: /api/src/config.js
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      APP_VERSION: v2
      BACKEND_PORT_1: "3000"
      BACKEND_PORT_2: "3001"
      LOG_LEVEL: debug
      PORT: "3001"
      REDIS_URL: redis://redis:6379
    image: mikolajroot/backend:latest
    logging:
      driver: json-file
    networks:
      app-net: null
      db-net: null
      proxy-net:
        ipv4_address: 172.18.0.12
    secrets:
      - source: db_password
        target: /run/secrets/db_password
      - source: db_user
        target: /run/secrets/db_user
    tmpfs:
      - /app/tmp_data
    volumes:
      - type: volume
        source: backend_data
        target: /app/persistent_data
        volume: {}
  nginx:
    configs:
      - source: nginx_config
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      backend_1:
        condition: service_started
        required: true
      backend_2:
        condition: service_started
        required: true
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: "268435456"
    image: mikolajroot/frontend:latest
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m
    networks:
      proxy-net: null
    ports:
      - mode: ingress
        target: 8080
        published: "80"
        protocol: tcp
  postgres:
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: product_db
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_USER_FILE: /run/secrets/db_user
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres
      timeout: 5s
      interval: 5s
      retries: 5
    image: postgres:16-alpine
    mac_address: 02:42:ac:14:00:0a
    networks:
      db-net:
        ipv4_address: 172.20.0.10
    secrets:
      - source: db_password
        target: /run/secrets/db_password
      - source: db_user
        target: /run/secrets/db_user
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql/data
        volume: {}
  redis:
    healthcheck:
      test:
        - CMD
        - redis-cli
        - --raw
        - incr
        - ping
      timeout: 5s
      interval: 5s
      retries: 5
    image: redis:8-alpine
    networks:
      app-net: null
    volumes:
      - type: volume
        source: redis_data
        target: /data
        volume: {}
  worker:
    depends_on:
      postgres:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      APP_VERSION: v2
      BACKEND_PORT_1: "3000"
      BACKEND_PORT_2: "3001"
      LOG_LEVEL: info
      PGHOST: postgres
      PGPASSWORD: /run/secrets/db_password
      PGUSER: /run/secrets/db_user
      REDIS_URL: redis://redis:6379
    image: mikolajroot/worker:latest
    networks:
      app-net: null
      db-net: null
    secrets:
      - source: db_password
        target: /run/secrets/db_password
      - source: db_user
        target: /run/secrets/db_user
networks:
  app-net:
    name: cloud_app-net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.19.0.0/16
          gateway: 172.19.0.1
  db-net:
    name: cloud_db-net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
  proxy-net:
    name: cloud_proxy-net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.18.0.0/16
          gateway: 172.18.0.1
volumes:
  backend_data:
    name: cloud_backend_data
  postgres_data:
    name: cloud_postgres_data
  redis_data:
    name: cloud_redis_data
secrets:
  db_password:
    name: cloud_db_password
    file: /mnt/c/Users/roni2/Documents/cloud/secrets/db_password.txt
  db_user:
    name: cloud_db_user
    file: /mnt/c/Users/roni2/Documents/cloud/secrets/db_user.txt
configs:
  app_config:
    name: cloud_app_config
    file: /mnt/c/Users/roni2/Documents/cloud/backend/src/config.js
  nginx_config:
    name: cloud_nginx_config
    file: /mnt/c/Users/roni2/Documents/cloud/frontend/nginx.conf
x-backend-base:
  env_file:
    - path: .env.common
      required: true
    - path: .env.local
      required: false
  environment:
    LOG_LEVEL: info
    PGHOST: postgres
    PGPASSWORD: /run/secrets/db_password
    PGUSER: /run/secrets/db_user
    REDIS_URL: redis://redis:6379
